name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        ruby-version: ["3.2", "3.3", "3.4"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/checkout@v4
        with:
          repository: xjackk/chamomile
          path: chamomile
      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: ${{ matrix.ruby-version }}
          bundler-cache: true
      - name: Verify shim loads and aliases correctly
        run: bundle exec ruby -e "require 'petals'; raise 'Alias failed' unless Petals == Chamomile; puts 'Petals shim OK'"
