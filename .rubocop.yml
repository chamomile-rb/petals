AllCops:
  TargetRubyVersion: 3.2
  NewCops: enable
  SuggestExtensions: false

# We use double quotes consistently throughout
Style/StringLiterals:
  EnforcedStyle: double_quotes

Style/StringLiteralsInInterpolation:
  EnforcedStyle: double_quotes

# RSpec blocks are naturally long
Metrics/BlockLength:
  Exclude:
    - 'spec/**/*'
    - '*.gemspec'

# TextInput, TextArea, List are complex by nature — they handle many key bindings
Metrics/ClassLength:
  Max: 370

# Some methods (handle_key, view) need to handle many cases
Metrics/MethodLength:
  Max: 35

Metrics/AbcSize:
  Max: 38

Metrics/CyclomaticComplexity:
  Max: 18

Metrics/PerceivedComplexity:
  Max: 18

# We use keyword args extensively — 10 is fine for options-heavy constructors
Metrics/ParameterLists:
  Max: 10

# Short names like n, p, v are clear in context (setters, clamp helpers)
Naming/MethodParameterName:
  AllowedNames:
    - n
    - p
    - v
    - c
    - k
    - i
    - s
    - t
    - x
    - "y"

# BubbleTea-matching API names: set_content, set_percent, did_select_file?
Naming/AccessorMethodName:
  Enabled: false

Naming/PredicateMethod:
  Enabled: false

# We prefer annotated format strings but won't enforce everywhere
Style/FormatStringToken:
  Enabled: false

# Examples are informal — relax documentation requirement
Style/Documentation:
  Exclude:
    - 'spec/**/*'
    - 'examples/**/*'

# We use -> for all lambdas (single and multiline) for consistency
Style/Lambda:
  EnforcedStyle: literal

# Trailing commas in multiline — keeps diffs clean
Style/TrailingCommaInArrayLiteral:
  EnforcedStyleForMultiline: consistent_comma

Style/TrailingCommaInHashLiteral:
  EnforcedStyleForMultiline: consistent_comma

# Dev deps in gemspec is fine for a single-gemspec project
Gemspec/DevelopmentDependencies:
  Enabled: false
