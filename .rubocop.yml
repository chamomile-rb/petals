AllCops:
  TargetRubyVersion: 3.2
  NewCops: enable
  SuggestExtensions: false

# We use double quotes consistently throughout
Style/StringLiterals:
  EnforcedStyle: double_quotes

Style/StringLiteralsInInterpolation:
  EnforcedStyle: double_quotes

# RSpec blocks are naturally long
Metrics/BlockLength:
  Exclude:
    - 'spec/**/*'
    - '*.gemspec'

# TextInput is complex by nature — it handles many key bindings
Metrics/ClassLength:
  Max: 250

# Some methods (handle_key, view) need to handle many cases
Metrics/MethodLength:
  Max: 30

Metrics/AbcSize:
  Max: 35

Metrics/CyclomaticComplexity:
  Max: 18

Metrics/PerceivedComplexity:
  Max: 18

# We use keyword args extensively — 8 is fine for options-heavy constructors
Metrics/ParameterLists:
  Max: 8

# Short names like n, p, v are clear in context (setters, clamp helpers)
Naming/MethodParameterName:
  AllowedNames:
    - n
    - p
    - v
    - c
    - k
    - i

# chamomile-leaves.rb is the conventional gem entry point name
Naming/FileName:
  Exclude:
    - 'lib/chamomile-leaves.rb'

# We prefer annotated format strings but won't enforce everywhere
Style/FormatStringToken:
  Enabled: false

# Examples are informal — relax documentation requirement
Style/Documentation:
  Exclude:
    - 'spec/**/*'
    - 'examples/**/*'

# We use -> for all lambdas (single and multiline) for consistency
Style/Lambda:
  EnforcedStyle: literal

# Trailing commas in multiline — keeps diffs clean
Style/TrailingCommaInArrayLiteral:
  EnforcedStyleForMultiline: consistent_comma

Style/TrailingCommaInHashLiteral:
  EnforcedStyleForMultiline: consistent_comma
